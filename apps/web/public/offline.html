<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Offline – Black Belt Legacy</title>
    <!-- Pre-cached by /sw.js and served on navigation fetch failure.
         Zero JS by design (iOS Safari offline must render this standalone);
         colors mirror the BBL chrome tokens in app/styles.css. -->
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #ffffff;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        text-align: center;
      }
      main {
        padding: 2rem;
        max-width: 24rem;
      }
      .belt {
        width: 4rem;
        height: 0.5rem;
        margin: 0 auto 1.5rem;
        background: #e52421;
        border-radius: 2px;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #a3a3a3;
        line-height: 1.5;
        margin: 0 0 1.5rem;
      }
      a {
        color: #ffffff;
        background: #e52421;
        text-decoration: none;
        padding: 0.6rem 1.4rem;
        border-radius: 0.5rem;
        display: inline-block;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="belt" aria-hidden="true"></div>
      <h1>You&rsquo;re offline</h1>
      <p>
        Black Belt Legacy needs a connection to load this page. Check your network and try again.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
