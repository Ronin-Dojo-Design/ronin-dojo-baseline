name: Playwright E2E

# SESSION_0267_FINDING_02 closure: the playwright.config.ts cross-browser
# project additions from SESSION_0266 have never been exercised on CI
# because no GitHub Actions workflow existed. This workflow runs the
# chromium full suite + firefox/webkit lineage subset on every PR, every
# push to main, and on demand.

on:
  # Skip on commits that only touch docs / agent context / IDE config.
  # SESSION_0267 commit pattern shows ~30-50% of commits are docs-only
  # (SESSION files, wiki updates, runbook edits). Path filters apply to
  # both pull_request and push to keep behavior symmetric.
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.claude/**'
      - '.github/copilot-instructions.md'
      - '.github/prompts/**'
      # `clients/**` is its own deploy unit (ADR 0034) with its own gate
      # (clients-ci.yml). A client-only change can't affect apps/web's e2e, so
      # it no longer fires BBL's chromium/firefox/webkit ×3 matrix (SESSION_0462).
      - 'clients/**'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.claude/**'
      - '.github/copilot-instructions.md'
      - '.github/prompts/**'
      - 'clients/**'
  workflow_dispatch:

# Least privilege: the e2e job only needs to read the repo (SESSION_0335
# security hardening — default GITHUB_TOKEN perms are broader than needed).
permissions:
  contents: read

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    # SESSION_0268: split browsers into parallel single-worker jobs. This
    # keeps the useful cross-browser signal from SESSION_0267 while reducing
    # wall time versus one 30m serial job.
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ronindojo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Required by env.ts t3-env validation
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ronindojo_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ronindojo_test
      BETTER_AUTH_SECRET: ci-only-secret-not-for-production-32b
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_EMAIL: ci@ronindojo.test
      # Optional but consumed by some seed/auth paths
      CRON_SECRET: ci-cron-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # `lib/i18n.ts` uses `fs.promises.glob` (Node 22+). Root
          # package.json declares `engines.node: ">=20"` but the code
          # actually requires 22+. Pinning 22 (LTS Jod) for CI.
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate
        working-directory: apps/web

      - name: Apply Prisma migrations
        run: bunx prisma migrate deploy
        working-directory: apps/web

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.project }}-${{ hashFiles('apps/web/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps ${{ matrix.project }}
        working-directory: apps/web

      - name: Install Playwright OS deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps ${{ matrix.project }}
        working-directory: apps/web

      - name: Run Playwright tests
        # Chromium runs the full e2e/ tree; firefox + webkit run only e2e/lineage/
        # per playwright.config.ts per-project `testDir` scoping (SESSION_0266).
        run: bunx playwright test --project=${{ matrix.project }}
        working-directory: apps/web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload test-results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-${{ matrix.project }}
          path: apps/web/test-results/
          retention-days: 7

      # SESSION_0334: ntfy.sh push on CI failure.
      # Requires the NTFY_TOPIC repo secret to be set:
      #   gh secret set NTFY_TOPIC
      # The `secrets` context isn't reliable inside step `if:`, so we gate only on
      # failure() here and skip inside the script when the topic is unset. Never
      # put a literal topic value in this file.
      - name: Notify on failure (ntfy)
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "${NTFY_TOPIC}" ]; then
            echo "NTFY_TOPIC secret unset — skipping ntfy notify."
            exit 0
          fi
          curl -fsS --max-time 15 \
            -H "Title: CI failed: Playwright (${{ matrix.project }})" \
            -H "Priority: 4" \
            -H "Tags: x,test_tube" \
            -d "Playwright ${{ matrix.project }} failed on ${{ github.ref_name }} (${{ github.sha }}). Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.sh/${NTFY_TOPIC}" || true
