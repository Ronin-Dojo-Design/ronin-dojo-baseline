name: Products CI

# SESSION_0462 (ADR 0034 multi-product platform): per-product CI for the
# non-flagship products — `clients/*` (client-handoff products, e.g. Mammoth)
# AND sibling `apps/*` peers (e.g. `apps/baseline`), i.e. every product EXCEPT
# the BBL flagship `apps/web` (which has its own rich gate: ci.yml + playwright.yml).
#
# Before this, BBL's apps/web matrix (ci.yml + the playwright.yml ×3 browser
# matrix) fired on ANY non-docs change — including a product-only commit that
# can't affect apps/web at all (deploy was already correctly skipped by
# vercel.json ignoreCommand, but CI minutes were still burned). This workflow
# gives the other products their OWN lightweight gate (typecheck + optional lint),
# and the sibling paths-ignore in ci.yml/playwright.yml keeps a product-only change
# from running BBL's e2e.
#
# Dynamic matrix: the `discover` job lists every product dir with a package.json
# under `clients/*` AND `apps/*` (minus `apps/web`), so a NEW product — client OR
# `apps/baseline` (SESSION_0463) — gets CI automatically with no edit here (the
# mechanical-onboarding theme; pairs with scripts/new-client-scaffold.ts).

on:
  # Run on product changes AND on shared-kernel changes — products consume
  # packages/ui-kit (ADR 0033), so a kernel edit can break a product's typecheck
  # and must be caught here too. `apps/web/**` is intentionally NOT a trigger: it
  # has its own gate (ci.yml + playwright.yml) and is excluded from the discover
  # matrix. (clients/* are standalone — own bun.lock, NOT workspace members — so
  # the root lockfile/config is NOT a trigger for them; apps/* peers are workspace
  # members but are installed in-dir below, mirroring the standalone flow.)
  pull_request:
    branches: [main]
    paths:
      - 'clients/**'
      - 'apps/baseline/**'
      - 'apps/rdd/**'
      - 'packages/**'
  push:
    branches: [main]
    paths:
      - 'clients/**'
      - 'apps/baseline/**'
      - 'apps/rdd/**'
      - 'packages/**'
  workflow_dispatch:

# Least privilege: these jobs only read the repo (mirrors ci.yml/playwright.yml).
permissions:
  contents: read

concurrency:
  group: products-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover products
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      products: ${{ steps.list.outputs.products }}
      empty: ${{ steps.list.outputs.empty }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        name: List clients/* and apps/* product dirs (excluding apps/web)
        run: |
          # Each immediate subdir of clients/ OR apps/ holding a package.json is a
          # product. `apps/web` is the BBL flagship — it has its own gate
          # (ci.yml + playwright.yml), so it is excluded here. Emit FULL relative
          # paths (e.g. clients/mammoth-build-crm, apps/baseline) so the matrix's
          # working-directory is unambiguous across both roots.
          products=$(
            { find clients apps -mindepth 1 -maxdepth 1 -type d 2>/dev/null; } \
              | while read -r d; do
                  [ "$d" = "apps/web" ] && continue
                  [ -f "$d/package.json" ] && echo "$d"
                done \
              | sort | jq -R . | jq -cs .
          )
          [ -z "$products" ] && products='[]'
          echo "products=$products" >> "$GITHUB_OUTPUT"
          if [ "$products" = '[]' ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered products: $products"

  check:
    name: Check (${{ matrix.product }})
    needs: discover
    if: needs.discover.outputs.empty == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJSON(needs.discover.outputs.products) }}
    env:
      # Products own their DATABASE_URL (ADR 0038). A dummy satisfies
      # `prisma generate`, which resolves the URL via prisma.config.ts but never
      # connects. Real DB-backed checks run against the product's own DB locally.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      # Products are installed in-dir so the product's own lockfile is the source
      # of truth (clients/* are standalone with own bun.lock; apps/* peers are
      # workspace members but install cleanly in-dir too — mirrors the flow).
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ matrix.product }}
      # Generate the Prisma client only if the product has a schema (some products
      # may be pre-DB). Typecheck needs the generated types once the app imports
      # the client (Phase 2); harmless before then.
      - name: Generate Prisma client
        if: ${{ hashFiles(format('{0}/prisma/schema.prisma', matrix.product)) != '' }}
        run: bunx prisma generate
        working-directory: ${{ matrix.product }}
      # Typecheck is the baseline contract — every product must define a
      # `typecheck` script (the runbook requires it). A missing script fails here
      # with a clear "Script not found" message, which is the correct signal.
      - name: Typecheck
        run: bun run typecheck
        working-directory: ${{ matrix.product }}
      # Test is opt-in per product: run it when the product declares a `test`
      # script. This closes WL-P3-56 for standalone clients like Mammoth, whose
      # app-local tests are otherwise invisible to root/product CI.
      - name: Test (if the product defines test)
        working-directory: ${{ matrix.product }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            bun run test
          else
            echo "No test script in ${{ matrix.product }} — skipping."
          fi
      # Lint is opt-in per product: run lint:check only if the product defines it
      # (apps/web uses oxlint; a product adopts it when ready). Skipping is loud,
      # not silent — a real lint failure still fails the job.
      - name: Lint (if the product defines lint:check)
        working-directory: ${{ matrix.product }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['lint:check'] ? 0 : 1)"; then
            bun run lint:check
          else
            echo "No lint:check script in ${{ matrix.product }} — skipping (add oxlint to enable a lint gate)."
          fi
