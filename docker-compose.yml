services:
  postgres:
    image: postgres:16
    container_name: ronindojo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ronindojo_dev
    volumes:
      - ronindojo_pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ronindojo_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  ronindojo_pgdata:
